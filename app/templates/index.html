{% extends "base.html" %}
{% block content %}
<h2>Список устройств</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Имя</th>
            <th>IP-адрес</th>
            <th>Тип</th>
            <th>Статус</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
    {% for device in devices %}
        <tr>
            <td>{{ device.name }}</td>
            <td>{{ device.ip_address }}</td>
            <td>{{ device.device_type }}</td>
            <td>
                {% if statuses[device.id] %}
                    <span class="badge bg-success">Онлайн</span>
                {% else %}
                    <span class="badge bg-danger">Оффлайн</span>
                {% endif %}
            </td>
            <td><a href="/device/{{ device.id }}" class="btn btn-sm btn-primary">Подробнее</a></td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
